<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Sharif QA Site{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
  </head>
  <body>
    <header class="site-header">
      <a class="site-logo" href="{{ url_for('demo_home') }}">Sharif QA Site</a>
      <nav class="site-nav" aria-label="Demo site navigation">
        <a class="{{ 'active' if active_page == 'home' else '' }}" href="{{ url_for('demo_home') }}">Home</a>
        <a class="{{ 'active' if active_page == 'about' else '' }}" href="{{ url_for('demo_about') }}">About</a>
        <a class="{{ 'active' if active_page == 'services' else '' }}" href="{{ url_for('demo_services') }}">Services</a>
        <a class="{{ 'active' if active_page == 'contact' else '' }}" href="{{ url_for('demo_contact') }}">Contact</a>
        {% if user %}
          <a class="{{ 'active' if active_page == 'dashboard' else '' }}" href="{{ url_for('demo_dashboard') }}">Dashboard</a>
          <a href="{{ url_for('demo_logout') }}">Logout</a>
        {% else %}
          <a class="{{ 'active' if active_page == 'login' else '' }}" href="{{ url_for('demo_login') }}">Login</a>
          <a class="{{ 'active' if active_page == 'signin' else '' }}" href="{{ url_for('demo_signin') }}">Sign In</a>
        {% endif %}
      </nav>
    </header>

    <main class="site-main">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <span>Demo pages for manual, live-page, database, and Playwright automation testing.</span>
      <a href="{{ url_for('index') }}">Open QA Test Manager</a>
    </footer>

    <script src="{{ url_for('static', filename='site.js') }}"></script>
  </body>
</html>
